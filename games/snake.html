<!DOCTYPE html>
<html lang="en" data-theme="vscode">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — cppup</title>
<style>
:root,[data-theme="vscode"]{
  --bg:#1e1e1e;--panel:#252526;--panel2:#2d2d30;--border:#3c3c3c;
  --text:#cccccc;--text-dim:#858585;--accent:#569cd6;--green:#4ec9b0;
  --yellow:#dcdcaa;--orange:#ce9178;--red:#f44747;--purple:#c586c0;
}
[data-theme="dracula"]{
  --bg:#282a36;--panel:#313442;--panel2:#44475a;--border:#6272a4;
  --text:#f8f8f2;--text-dim:#6272a4;--accent:#bd93f9;--green:#50fa7b;
  --yellow:#f1fa8c;--orange:#ffb86c;--red:#ff5555;--purple:#ff79c6;
}
[data-theme="monokai"]{
  --bg:#272822;--panel:#2c2d26;--panel2:#3e3d32;--border:#75715e;
  --text:#f8f8f2;--text-dim:#75715e;--accent:#66d9e8;--green:#a6e22e;
  --yellow:#e6db74;--orange:#fd971f;--red:#f92672;--purple:#ae81ff;
}
[data-theme="solarized"]{
  --bg:#002b36;--panel:#073642;--panel2:#0d3d4f;--border:#586e75;
  --text:#839496;--text-dim:#586e75;--accent:#268bd2;--green:#859900;
  --yellow:#b58900;--orange:#cb4b16;--red:#dc322f;--purple:#6c71c4;
}
[data-theme="light"]{
  --bg:#fffdf7;--panel:#f5f2ec;--panel2:#ede9e0;--border:#d4cfc5;
  --text:#3a3a3a;--text-dim:#8a8a8a;--accent:#0070c1;--green:#007f6e;
  --yellow:#967a00;--orange:#8b4513;--red:#c00000;--purple:#7b3f9e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  transition:background 0.25s ease,color 0.25s ease;min-height:100vh;
}
a{color:var(--accent);text-decoration:none;transition:opacity 0.2s}
a:hover{opacity:0.8}

.topnav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:1rem;padding:0.75rem 1.5rem;
  background:var(--panel);border-bottom:1px solid var(--border);
  transition:background 0.25s ease,border-color 0.25s ease;
}
.nav-brand{
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:1.15rem;font-weight:700;color:var(--accent);white-space:nowrap;
}
.nav-brand .blink{animation:blink 1.1s step-end infinite;color:var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.nav-links{display:flex;gap:1.25rem;margin-left:auto}
.nav-links a{color:var(--text-dim);font-size:0.9rem;transition:color 0.25s ease}
.nav-links a:hover{color:var(--text)}
.theme-switcher{display:flex;gap:0.4rem;margin-left:1rem}
.theme-btn{
  background:var(--panel2);border:1px solid var(--border);color:var(--text-dim);
  font-size:0.72rem;font-family:'JetBrains Mono','Cascadia Code',Consolas,monospace;
  padding:0.2rem 0.45rem;border-radius:3px;cursor:pointer;transition:all 0.2s ease;line-height:1.4;
}
.theme-btn:hover{color:var(--text);border-color:var(--accent)}
.theme-btn.active{color:var(--accent);border-color:var(--accent);background:var(--panel)}

.container{max-width:580px;margin:0 auto;padding:1.5rem 1rem}
.back-link{
  display:inline-flex;align-items:center;gap:0.4rem;
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:0.85rem;color:var(--text-dim);margin-bottom:1rem;
  border:1px solid var(--border);padding:0.3rem 0.75rem;border-radius:4px;transition:all 0.2s ease;
}
.back-link:hover{color:var(--accent);border-color:var(--accent);opacity:1}

.game-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;
}
.game-title-lbl{
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:1.4rem;font-weight:700;color:var(--accent);
}
.scores{display:flex;gap:0.75rem}
.score-box{
  background:var(--panel);border:1px solid var(--border);border-radius:5px;
  padding:0.4rem 0.9rem;text-align:center;min-width:70px;
}
.score-lbl{
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:0.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;
}
.score-val{
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:1.1rem;font-weight:700;color:var(--text);
}

.canvas-wrap{
  position:relative;width:100%;
  border:1px solid var(--border);border-radius:6px;overflow:hidden;
  background:var(--panel);
}
canvas{display:block;width:100%;height:auto}

.controls-hint{
  margin-top:0.75rem;
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:0.78rem;color:var(--text-dim);text-align:center;
}

footer{
  margin-top:2rem;padding:1rem;text-align:center;
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:0.78rem;color:var(--text-dim);border-top:1px solid var(--border);
}

@media(max-width:480px){
  .nav-links{display:none}
  .container{padding:1rem 0.75rem}
}
</style>
</head>
<body>

<nav class="topnav">
  <a class="nav-brand" href="/">cppup<span class="blink">_</span></a>
  <div class="nav-links">
    <a href="/#about">About</a>
    <a href="/#blog">Blog</a>
    <a href="/#games">Games</a>
    <a href="https://github.com/cppup" target="_blank" rel="noopener">GitHub</a>
  </div>
  <div class="theme-switcher">
    <button class="theme-btn" data-t="vscode" title="VSCode Dark">VS</button>
    <button class="theme-btn" data-t="dracula" title="Dracula">Dr</button>
    <button class="theme-btn" data-t="monokai" title="Monokai">Mo</button>
    <button class="theme-btn" data-t="solarized" title="Solarized Dark">So</button>
    <button class="theme-btn" data-t="light" title="Light">☀</button>
  </div>
</nav>

<div class="container">
  <a class="back-link" href="index.html">← Back</a>

  <div class="game-header">
    <div class="game-title-lbl">🐍 Snake</div>
    <div class="scores">
      <div class="score-box">
        <div class="score-lbl">Score</div>
        <div class="score-val" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-lbl">Best</div>
        <div class="score-val" id="best">0</div>
      </div>
    </div>
  </div>

  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="game-canvas" width="500" height="500"></canvas>
  </div>

  <div class="controls-hint">
    WASD / Arrow keys to move · Space to start/pause · R to restart
  </div>
</div>

<footer>© 2025 cppup · <a href="index.html">Game Center</a></footer>

<script>
// ── Theme ──────────────────────────────────────────────────────────────
const THEME_KEY = 'cppup-theme';
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  localStorage.setItem(THEME_KEY, t);
  document.querySelectorAll('.theme-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.t === t));
}
document.querySelectorAll('.theme-btn').forEach(b =>
  b.addEventListener('click', () => applyTheme(b.dataset.t)));
applyTheme(localStorage.getItem(THEME_KEY) || 'vscode');

// ── Snake Game ─────────────────────────────────────────────────────────
const canvas  = document.getElementById('game-canvas');
const ctx     = canvas.getContext('2d');
const COLS = 20, ROWS = 20, CELL = 25;
const BEST_KEY = 'snake-best';
const INITIAL_TICK_MS = 150;
const MIN_TICK_MS = 60;
const TICK_DECREASE_MS = 15;
const SPEED_INCREASE_INTERVAL = 5;

let snake, dir, nextDir, food, score, best, state, tickInterval, foodEaten;
let foodPulse = 0;  // for food animation (0-2*PI)
let lastTime = 0;
let tickMs = INITIAL_TICK_MS;

function getCSSVar(n) {
  return getComputedStyle(document.documentElement).getPropertyValue(n).trim();
}

function initGame() {
  const startX = Math.floor(COLS / 2) - 1;
  const startY = Math.floor(ROWS / 2);
  snake = [{x:startX+1,y:startY},{x:startX,y:startY},{x:startX-1,y:startY}]; // head first, moving right
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; foodEaten = 0;
  tickMs = INITIAL_TICK_MS;
  best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
  state = 'waiting';
  placeFood();
  updateScoreDisplay();
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

function placeFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  let x, y;
  do {
    x = Math.floor(Math.random() * COLS);
    y = Math.floor(Math.random() * ROWS);
  } while (occupied.has(`${x},${y}`));
  food = {x, y};
}

function tick() {
  if (state !== 'playing') return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    state = 'over'; return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    state = 'over'; return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    foodEaten++;
    if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); }
    updateScoreDisplay();
    placeFood();
    // Speed up every SPEED_INCREASE_INTERVAL food items
    if (foodEaten % SPEED_INCREASE_INTERVAL === 0) tickMs = Math.max(MIN_TICK_MS, tickMs - TICK_DECREASE_MS);
  } else {
    snake.pop();
  }
}

function updateScoreDisplay() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent  = best;
}

let lastTick = 0;
let rafId;
function loop(ts) {
  rafId = requestAnimationFrame(loop);
  foodPulse = (foodPulse + 0.07) % (Math.PI * 2);

  if (state === 'playing' && ts - lastTick >= tickMs) {
    tick();
    lastTick = ts;
  }

  draw();
}

function draw() {
  const bg      = getCSSVar('--panel');
  const panel2  = getCSSVar('--panel2');
  const border  = getCSSVar('--border');
  const textCol = getCSSVar('--text');
  const textDim = getCSSVar('--text-dim');
  const accent  = getCSSVar('--accent');
  const green   = getCSSVar('--green');
  const red     = getCSSVar('--red');
  const yellow  = getCSSVar('--yellow');

  // Background
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = border;
  ctx.globalAlpha = 0.2;
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c*CELL, 0); ctx.lineTo(c*CELL, ROWS*CELL); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r*CELL); ctx.lineTo(COLS*CELL, r*CELL); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Food with pulse
  const pulse = 0.75 + 0.25 * Math.sin(foodPulse);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = yellow;
  const fp = 3;
  ctx.fillRect(food.x*CELL+fp, food.y*CELL+fp, CELL-fp*2, CELL-fp*2);
  ctx.globalAlpha = 1;

  // Snake
  snake.forEach((seg, i) => {
    const isHead = i === 0;
    ctx.fillStyle = isHead ? accent : green;
    ctx.globalAlpha = isHead ? 1 : Math.max(0.4, 1 - i * 0.03);
    const margin = isHead ? 1 : 2;
    ctx.fillRect(seg.x*CELL+margin, seg.y*CELL+margin, CELL-margin*2, CELL-margin*2);
  });
  ctx.globalAlpha = 1;

  // Overlay messages
  if (state === 'waiting') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = textCol;
    ctx.font = 'bold 20px JetBrains Mono, Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Press SPACE to start', canvas.width/2, canvas.height/2);
    ctx.font = '14px JetBrains Mono, Consolas, monospace';
    ctx.fillStyle = textDim;
    ctx.fillText('Use WASD or Arrow keys to move', canvas.width/2, canvas.height/2 + 30);
  } else if (state === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = textCol;
    ctx.font = 'bold 20px JetBrains Mono, Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
    ctx.font = '14px JetBrains Mono, Consolas, monospace';
    ctx.fillStyle = textDim;
    ctx.fillText('Press SPACE to resume', canvas.width/2, canvas.height/2 + 28);
  } else if (state === 'over') {
    ctx.fillStyle = 'rgba(0,0,0,0.68)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = red;
    ctx.font = 'bold 28px JetBrains Mono, Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over', canvas.width/2, canvas.height/2 - 20);
    ctx.fillStyle = textCol;
    ctx.font = '16px JetBrains Mono, Consolas, monospace';
    ctx.fillText(`Score: ${score}`, canvas.width/2, canvas.height/2 + 14);
    ctx.fillStyle = textDim;
    ctx.font = '14px JetBrains Mono, Consolas, monospace';
    ctx.fillText('Press R to restart', canvas.width/2, canvas.height/2 + 44);
  }
}

// ── Input ──────────────────────────────────────────────────────────────
const DIRS = {
  ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0}, ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1},
  a:{x:-1,y:0}, d:{x:1,y:0}, w:{x:0,y:-1}, s:{x:0,y:1},
  A:{x:-1,y:0}, D:{x:1,y:0}, W:{x:0,y:-1}, S:{x:0,y:1},
};

document.addEventListener('keydown', e => {
  if (e.key === ' ') {
    e.preventDefault();
    if (state === 'over') { initGame(); state = 'playing'; }
    else if (state === 'waiting') { state = 'playing'; }
    else if (state === 'playing') state = 'paused';
    else if (state === 'paused') state = 'playing';
    return;
  }
  if (e.key === 'r' || e.key === 'R') { initGame(); return; }
  if (DIRS[e.key]) {
    e.preventDefault();
    const d = DIRS[e.key];
    // Prevent reversing
    if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    if (state === 'waiting') { state = 'playing'; }
  }
});

// Touch swipe
let tx = 0, ty = 0;
const wrap = document.getElementById('canvas-wrap');
wrap.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, {passive:true});
wrap.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 15 && Math.abs(dy) < 15) {
    // Tap = space
    if (state === 'waiting') state = 'playing';
    else if (state === 'playing') state = 'paused';
    else if (state === 'paused') state = 'playing';
    else if (state === 'over') initGame();
    return;
  }
  let d;
  if (Math.abs(dx) > Math.abs(dy)) d = dx > 0 ? DIRS.ArrowRight : DIRS.ArrowLeft;
  else d = dy > 0 ? DIRS.ArrowDown : DIRS.ArrowUp;
  if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
  if (state === 'waiting') state = 'playing';
}, {passive:true});

initGame();
</script>
</body>
</html>
