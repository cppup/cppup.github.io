<!DOCTYPE html>
<html lang="en" data-theme="vscode">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 — cppup</title>
<style>
:root,[data-theme="vscode"]{
  --bg:#1e1e1e;--panel:#252526;--panel2:#2d2d30;--border:#3c3c3c;
  --text:#cccccc;--text-dim:#858585;--accent:#569cd6;--green:#4ec9b0;
  --yellow:#dcdcaa;--orange:#ce9178;--red:#f44747;--purple:#c586c0;
}
[data-theme="dracula"]{
  --bg:#282a36;--panel:#313442;--panel2:#44475a;--border:#6272a4;
  --text:#f8f8f2;--text-dim:#6272a4;--accent:#bd93f9;--green:#50fa7b;
  --yellow:#f1fa8c;--orange:#ffb86c;--red:#ff5555;--purple:#ff79c6;
}
[data-theme="monokai"]{
  --bg:#272822;--panel:#2c2d26;--panel2:#3e3d32;--border:#75715e;
  --text:#f8f8f2;--text-dim:#75715e;--accent:#66d9e8;--green:#a6e22e;
  --yellow:#e6db74;--orange:#fd971f;--red:#f92672;--purple:#ae81ff;
}
[data-theme="solarized"]{
  --bg:#002b36;--panel:#073642;--panel2:#0d3d4f;--border:#586e75;
  --text:#839496;--text-dim:#586e75;--accent:#268bd2;--green:#859900;
  --yellow:#b58900;--orange:#cb4b16;--red:#dc322f;--purple:#6c71c4;
}
[data-theme="light"]{
  --bg:#fffdf7;--panel:#f5f2ec;--panel2:#ede9e0;--border:#d4cfc5;
  --text:#3a3a3a;--text-dim:#8a8a8a;--accent:#0070c1;--green:#007f6e;
  --yellow:#967a00;--orange:#8b4513;--red:#c00000;--purple:#7b3f9e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:16px;line-height:1.6;
  transition:background 0.25s ease,color 0.25s ease;min-height:100vh;
}
a{color:var(--accent);text-decoration:none;transition:opacity 0.2s}
a:hover{opacity:0.8}

.topnav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:1rem;padding:0.75rem 1.5rem;
  background:var(--panel);border-bottom:1px solid var(--border);
  transition:background 0.25s ease,border-color 0.25s ease;
}
.nav-brand{
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:1.15rem;font-weight:700;color:var(--accent);white-space:nowrap;
}
.nav-brand .blink{animation:blink 1.1s step-end infinite;color:var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.nav-links{display:flex;gap:1.25rem;margin-left:auto}
.nav-links a{color:var(--text-dim);font-size:0.9rem;transition:color 0.25s ease}
.nav-links a:hover{color:var(--text)}
.theme-switcher{display:flex;gap:0.4rem;margin-left:1rem}
.theme-btn{
  background:var(--panel2);border:1px solid var(--border);color:var(--text-dim);
  font-size:0.72rem;font-family:'JetBrains Mono','Cascadia Code',Consolas,monospace;
  padding:0.2rem 0.45rem;border-radius:3px;cursor:pointer;transition:all 0.2s ease;line-height:1.4;
}
.theme-btn:hover{color:var(--text);border-color:var(--accent)}
.theme-btn.active{color:var(--accent);border-color:var(--accent);background:var(--panel)}

.container{max-width:540px;margin:0 auto;padding:2rem 1rem}
.back-link{
  display:inline-flex;align-items:center;gap:0.4rem;
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:0.85rem;color:var(--text-dim);margin-bottom:1.25rem;
  border:1px solid var(--border);padding:0.3rem 0.75rem;border-radius:4px;transition:all 0.2s ease;
}
.back-link:hover{color:var(--accent);border-color:var(--accent);opacity:1}

/* Score row */
.score-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1rem;
}
.game-title-lbl{
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:1.5rem;font-weight:700;color:var(--accent);
}
.scores{display:flex;gap:0.75rem}
.score-box{
  background:var(--panel);border:1px solid var(--border);border-radius:5px;
  padding:0.4rem 0.9rem;text-align:center;min-width:70px;
}
.score-lbl{
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:0.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;
}
.score-val{
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:1.1rem;font-weight:700;color:var(--text);
}
.btn-row{display:flex;gap:0.6rem;margin-bottom:1rem}
.btn{
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:0.85rem;font-weight:600;
  background:var(--panel2);color:var(--text);
  border:1px solid var(--border);border-radius:4px;
  padding:0.4rem 1rem;cursor:pointer;transition:all 0.2s ease;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}

/* Board */
.board-wrap{
  position:relative;
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:10px;user-select:none;touch-action:none;
}
.board{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.cell{
  background:var(--panel2);border-radius:5px;
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
}
.tile{
  position:absolute;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-weight:700;transition:top 0.1s ease,left 0.1s ease,transform 0.1s ease;
  z-index:2;
}
.tile.new{animation:pop 0.15s ease forwards}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.tile.merge{animation:merge-pop 0.18s ease forwards}
@keyframes merge-pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}

/* Tile colours via data-val */
.tile[data-val="2"]   {background:var(--panel2);color:var(--text-dim)}
.tile[data-val="4"]   {background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.tile[data-val="8"]   {background:var(--green);color:var(--bg)}
.tile[data-val="16"]  {background:var(--yellow);color:var(--bg)}
.tile[data-val="32"]  {background:var(--orange);color:var(--bg)}
.tile[data-val="64"]  {background:var(--red);color:var(--bg)}
.tile[data-val="128"] {background:var(--purple);color:var(--bg)}
.tile[data-val="256"] {background:var(--accent);color:var(--bg)}
.tile[data-val="512"] {background:var(--green);color:var(--bg);box-shadow:0 0 10px var(--green)}
.tile[data-val="1024"]{background:var(--yellow);color:var(--bg);box-shadow:0 0 10px var(--yellow)}
.tile[data-val="2048"]{
  background:linear-gradient(135deg,var(--accent),var(--purple));
  color:var(--bg);box-shadow:0 0 20px var(--accent);
}

/* Overlay */
.overlay{
  display:none;position:absolute;inset:0;border-radius:8px;
  background:rgba(0,0,0,0.72);
  flex-direction:column;align-items:center;justify-content:center;gap:1rem;
  z-index:10;
}
.overlay.show{display:flex}
.overlay-title{
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:1.8rem;font-weight:700;
}
.overlay-sub{
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:1rem;color:var(--text-dim);
}
#overlay-gameover .overlay-title{color:var(--red)}
#overlay-win .overlay-title{color:var(--accent)}
.overlay .btn{font-size:1rem;padding:0.5rem 1.5rem}

.controls-hint{
  margin-top:1rem;
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:0.78rem;color:var(--text-dim);text-align:center;
}

footer{
  margin-top:2rem;padding:1rem;text-align:center;
  font-family:'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
  font-size:0.78rem;color:var(--text-dim);
  border-top:1px solid var(--border);
}

@media(max-width:480px){
  .nav-links{display:none}
  .container{padding:1rem 0.75rem}
}
</style>
</head>
<body>

<nav class="topnav">
  <a class="nav-brand" href="/">cppup<span class="blink">_</span></a>
  <div class="nav-links">
    <a href="/#about">About</a>
    <a href="/#blog">Blog</a>
    <a href="/#games">Games</a>
    <a href="https://github.com/cppup" target="_blank" rel="noopener">GitHub</a>
  </div>
  <div class="theme-switcher">
    <button class="theme-btn" data-t="vscode" title="VSCode Dark">VS</button>
    <button class="theme-btn" data-t="dracula" title="Dracula">Dr</button>
    <button class="theme-btn" data-t="monokai" title="Monokai">Mo</button>
    <button class="theme-btn" data-t="solarized" title="Solarized Dark">So</button>
    <button class="theme-btn" data-t="light" title="Light">☀</button>
  </div>
</nav>

<div class="container">
  <a class="back-link" href="index.html">← Back</a>

  <div class="score-row">
    <div class="game-title-lbl">2048</div>
    <div class="scores">
      <div class="score-box">
        <div class="score-lbl">Score</div>
        <div class="score-val" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-lbl">Best</div>
        <div class="score-val" id="best">0</div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" id="btn-new">New Game</button>
  </div>

  <div class="board-wrap" id="board-wrap">
    <div class="board" id="board"></div>
    <div class="overlay" id="overlay-gameover">
      <div class="overlay-title">Game Over</div>
      <div class="overlay-sub">No more moves!</div>
      <button class="btn" id="btn-retry">Try Again</button>
    </div>
    <div class="overlay" id="overlay-win">
      <div class="overlay-title">You Win! 🎉</div>
      <div class="overlay-sub">You reached 2048!</div>
      <button class="btn" id="btn-keep">Keep Going</button>
      <button class="btn" id="btn-restart-win">New Game</button>
    </div>
  </div>

  <div class="controls-hint">Arrow keys to move · R to restart</div>
</div>

<footer>© 2025 cppup · <a href="index.html">Game Center</a></footer>

<script>
// ── Theme ──────────────────────────────────────────────────────────────
const THEME_KEY = 'cppup-theme';
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  localStorage.setItem(THEME_KEY, t);
  document.querySelectorAll('.theme-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.t === t));
}
document.querySelectorAll('.theme-btn').forEach(b =>
  b.addEventListener('click', () => applyTheme(b.dataset.t)));
applyTheme(localStorage.getItem(THEME_KEY) || 'vscode');

// ── 2048 Game Logic ────────────────────────────────────────────────────
const BEST_KEY = '2048-best';
const N = 4;
let board, score, best, won, over;

const boardEl   = document.getElementById('board');
const wrapEl    = document.getElementById('board-wrap');
const scoreEl   = document.getElementById('score');
const bestEl    = document.getElementById('best');
const goOverlay = document.getElementById('overlay-gameover');
const winOverlay= document.getElementById('overlay-win');

function newGame() {
  board = Array.from({length:N}, () => Array(N).fill(0));
  score = 0; won = false; over = false;
  best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
  bestEl.textContent = best;
  goOverlay.classList.remove('show');
  winOverlay.classList.remove('show');
  addRandomTile();
  addRandomTile();
  render();
}

function addRandomTile() {
  const empty = [];
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (!board[r][c]) empty.push([r,c]);
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
  return [r,c];
}

// Merge a single row leftward; returns {row, gained}
function mergeLeft(row) {
  const vals = row.filter(v => v);
  let gained = 0;
  for (let i = 0; i < vals.length - 1; i++) {
    if (vals[i] === vals[i+1]) {
      vals[i] *= 2;
      gained += vals[i];
      vals.splice(i+1, 1);
    }
  }
  while (vals.length < N) vals.push(0);
  return {row: vals, gained};
}

function rotateRight(b) {
  return Array.from({length:N}, (_,r) =>
    Array.from({length:N}, (_,c) => b[N-1-c][r]));
}
function rotateLeft(b) {
  return Array.from({length:N}, (_,r) =>
    Array.from({length:N}, (_,c) => b[c][N-1-r]));
}

function move(dir) {
  if (over) return false;
  let rotations = {left:0, right:2, up:3, down:1}[dir];
  let b = board;
  for (let i = 0; i < rotations; i++) b = rotateRight(b);

  let moved = false; let gained = 0;
  const newBoard = b.map(row => {
    const orig = [...row];
    const {row: merged, gained: g} = mergeLeft(row);
    if (merged.some((v,i) => v !== orig[i])) moved = true;
    gained += g;
    return merged;
  });

  let result = newBoard;
  for (let i = 0; i < (4 - rotations) % 4; i++) result = rotateRight(result);

  if (!moved) return false;
  board = result;
  score += gained;
  if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); }
  const pos = addRandomTile();
  render(pos, gained > 0);
  checkState();
  return true;
}

function checkState() {
  // Check win
  if (!won) {
    for (let r = 0; r < N; r++)
      for (let c = 0; c < N; c++)
        if (board[r][c] === 2048) { won = true; winOverlay.classList.add('show'); return; }
  }
  // Check game over
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      if (!board[r][c]) return;
      if (c < N-1 && board[r][c] === board[r][c+1]) return;
      if (r < N-1 && board[r][c] === board[r+1][c]) return;
    }
  over = true;
  goOverlay.classList.add('show');
}

// ── Rendering ─────────────────────────────────────────────────────────
function render(newPos, hadMerge) {
  scoreEl.textContent = score;
  bestEl.textContent  = best;

  // Measure cell positions from the static grid
  boardEl.innerHTML = '';
  // Create placeholder cells first to get dimensions
  for (let i = 0; i < N*N; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    boardEl.appendChild(cell);
  }

  // Remove existing tiles (not the overlay)
  wrapEl.querySelectorAll('.tile').forEach(t => t.remove());

  const cells = boardEl.querySelectorAll('.cell');
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      const val = board[r][c];
      if (!val) continue;
      const cell = cells[r*N+c];
      const rect  = cell.getBoundingClientRect();
      const wRect = wrapEl.getBoundingClientRect();
      const tile  = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.val = val;
      tile.textContent = val;
      tile.style.width  = rect.width + 'px';
      tile.style.height = rect.height + 'px';
      tile.style.top    = (rect.top  - wRect.top)  + 'px';
      tile.style.left   = (rect.left - wRect.left) + 'px';
      // Font size based on digits
      const digits = String(val).length;
      tile.style.fontSize = digits <= 2 ? '1.5rem' : digits === 3 ? '1.2rem' : '0.95rem';
      if (newPos && newPos[0] === r && newPos[1] === c) tile.classList.add('new');
      wrapEl.appendChild(tile);
    }
  }
}

// ── Input ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const map = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
  if (e.key === 'r' || e.key === 'R') newGame();
});

// Touch swipe
let tx = 0, ty = 0;
wrapEl.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, {passive:true});
wrapEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
}, {passive:true});

document.getElementById('btn-new').addEventListener('click', newGame);
document.getElementById('btn-retry').addEventListener('click', newGame);
document.getElementById('btn-restart-win').addEventListener('click', newGame);
document.getElementById('btn-keep').addEventListener('click', () => {
  winOverlay.classList.remove('show'); won = true;
});

// Recalculate tile positions on resize
window.addEventListener('resize', () => render());

newGame();
</script>
</body>
</html>
